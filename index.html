<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dossier INFOS PEDOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.18);
      --bg: #0b0a08;
      --text: #f0ead6;
      --muted: rgba(240,234,214,0.35);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      cursor: default;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Radial glow ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Thin corner lines ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1.4s ease forwards;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
    }
    .corner::before { width: 1px; height: 100%; }
    .corner::after  { width: 100%; height: 1px; }
    .corner.tl { top: 32px; left: 32px; animation-delay: 0.2s; }
    .corner.tl::before { top: 0; left: 0; }
    .corner.tl::after  { top: 0; left: 0; }

    .corner.tr { top: 32px; right: 32px; animation-delay: 0.3s; }
    .corner.tr::before { top: 0; right: 0; left: auto; }
    .corner.tr::after  { top: 0; left: 0; }

    .corner.bl { bottom: 32px; left: 32px; animation-delay: 0.4s; }
    .corner.bl::before { bottom: 0; left: 0; top: auto; }
    .corner.bl::after  { bottom: 0; left: 0; top: auto; }

    .corner.br { bottom: 32px; right: 32px; animation-delay: 0.5s; }
    .corner.br::before { bottom: 0; right: 0; left: auto; top: auto; }
    .corner.br::after  { bottom: 0; left: 0; top: auto; }

    /* ── Horizontal divider lines ── */
    .line-top,
    .line-bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
      z-index: 1;
      animation: expandLine 1.2s cubic-bezier(0.77,0,0.18,1) 0.6s forwards;
    }
    .line-top    { top: 100px; }
    .line-bottom { bottom: 100px; }

    @keyframes expandLine {
      from { width: 0; }
      to   { width: min(480px, 70vw); }
    }

    /* ── Main stage ── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      text-align: center;
      padding: 0 24px;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: riseIn 0.9s ease 0.8s forwards;
    }

    /* ── Title ── */
    .title {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 7vw, 5.5rem);
      line-height: 1.05;
      color: var(--text);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: riseIn 1s ease 1s forwards;
      text-shadow: 0 0 80px rgba(201,168,76,0.15);
    }

    .title em {
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.55em;
      color: var(--gold-light);
      display: block;
      letter-spacing: 0.18em;
      margin-top: 10px;
    }

    /* ── Ornament ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0;
      animation: riseIn 0.8s ease 1.2s forwards;
    }
    .ornament span {
      display: block;
      height: 1px;
      width: 48px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament span:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .ornament svg {
      fill: var(--gold);
      width: 14px;
      height: 14px;
      opacity: 0.8;
    }

    /* ── Button ── */
    .btn-wrap {
      opacity: 0;
      animation: riseIn 0.9s ease 1.4s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      outline: none;
      position: relative;
    }

    .btn-inner {
      position: relative;
      padding: 18px 52px;
      border: 1px solid rgba(201,168,76,0.45);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 1.6vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: color 0.4s ease, border-color 0.4s ease;
      overflow: hidden;
    }

    /* Gold fill on hover */
    .btn-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s cubic-bezier(0.77,0,0.18,1);
      z-index: 0;
    }

    .btn-inner span {
      position: relative;
      z-index: 1;
      transition: color 0.4s ease;
    }

    /* Arrow icon */
    .btn-arrow {
      width: 32px;
      height: 1px;
      background: var(--gold);
      position: relative;
      transition: width 0.4s ease;
      flex-shrink: 0;
    }
    .btn-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) rotate(35deg);
      width: 8px;
      height: 1px;
      background: var(--gold);
      transform-origin: right center;
      transition: transform 0.3s ease;
    }
    .btn-arrow::before {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%) rotate(-35deg);
      width: 8px;
      height: 1px;
      background: var(--gold);
      transform-origin: right center;
    }

    /* Hover states */
    .btn:hover .btn-inner {
      border-color: var(--gold);
      color: var(--bg);
    }
    .btn:hover .btn-inner::before {
      transform: scaleX(1);
    }
    .btn:hover .btn-arrow {
      width: 48px;
    }

    /* Corner glow on hover */
    .btn-inner::after {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid transparent;
      box-shadow: 0 0 20px rgba(201,168,76,0);
      transition: box-shadow 0.4s ease;
    }
    .btn:hover .btn-inner::after {
      box-shadow: 0 0 28px rgba(201,168,76,0.25);
    }

    /* ── Animations ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float var(--dur) ease-in-out var(--delay) infinite;
    }
    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) scale(1); }
      20%  { opacity: 0.6; }
      80%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-80px) scale(0); }
    }
  </style>
</head>
<body>

  <!-- Corners -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Lines -->
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Content -->
  <div class="stage">
    <p class="eyebrow">DOSSIER INFOS PERSOS PEDOS - SITE TEMPORAIRE</p>

    <h1 class="title">
      DOSSIER INFOS PEDOS
      <em>collection complète de fichiers contenant des informations personnelles de différents pédophiles</em>
    </h1>

    <div class="ornament">
      <span></span>
      <svg viewBox="0 0 16 16">
        <polygon points="8,1 10,6 15,6 11,9.5 12.5,15 8,12 3.5,15 5,9.5 1,6 6,6"/>
      </svg>
      <span></span>
    </div>

    <div class="btn-wrap">
      <a class="btn" href="https://mobidrive.com/sharelink/f/6IBhmmD3uzncvd6bC3YmrG4xt4jdKGuKeHX6VCdP9nVd" target="_blank" rel="noopener">
        <div class="btn-inner">
          <span>Accéder au dossier</span>
        </div>
        <div class="btn-arrow"></div>
      </a>
    </div>
  </div>

  <script>
    // Generate floating gold particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${40 + Math.random() * 40}%;
        --dur: ${4 + Math.random() * 6}s;
        --delay: ${Math.random() * 8}s;
        width: ${Math.random() > 0.7 ? 2 : 1}px;
        height: ${Math.random() > 0.7 ? 2 : 1}px;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
