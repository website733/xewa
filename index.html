<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CorpuLab — Calculateur IMC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3a5c;
    --teal: #0e7c7b;
    --teal-light: #12a39e;
    --gold: #c9a84c;
    --gold-light: #e8c870;
    --cream: #f5f0e8;
    --cream-dark: #ede6d6;
    --white: #ffffff;
    --text-primary: #0a1628;
    --text-muted: #5a6a7e;
    --text-light: #8a9ab0;
    --border: rgba(10,22,40,0.1);
    --shadow: 0 20px 60px rgba(10,22,40,0.12);
    --shadow-sm: 0 4px 16px rgba(10,22,40,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }

  .header-top {
    background: var(--navy-mid);
    padding: 6px 0;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    text-align: center;
    text-transform: uppercase;
    font-weight: 500;
  }

  .header-main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .logo-badge {
    width: 52px;
    height: 52px;
    background: var(--gold);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--navy);
    flex-shrink: 0;
    letter-spacing: -1px;
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: white;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  nav {
    margin-left: auto;
    display: flex;
    gap: 28px;
  }

  nav a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    transition: color 0.2s;
    text-transform: uppercase;
  }

  nav a:hover { color: var(--gold-light); }
  nav a.active { color: var(--gold-light); border-bottom: 1px solid var(--gold-light); }

  /* ── HERO ── */
  .hero {
    background: var(--navy);
    color: white;
    padding: 72px 32px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(14,124,123,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px;
    padding: 4px 12px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 20px;
    font-weight: 500;
  }

  .hero-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }

  .hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .hero h2 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .hero-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.65);
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 480px;
  }

  .hero-stats {
    display: flex;
    gap: 32px;
  }

  .hero-stat {
    border-left: 2px solid var(--gold);
    padding-left: 16px;
  }

  .hero-stat strong {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    color: var(--gold-light);
    letter-spacing: -1px;
  }

  .hero-stat span {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Hero image */
  .hero-visual {
    position: relative;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
    opacity: 0.85;
    filter: grayscale(20%);
  }

  .hero-img-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 50%, var(--teal) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }

  .hero-img-placeholder::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url("https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=600&q=80") center/cover no-repeat;
    opacity: 0.3;
  }

  .hero-img-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(10,22,40,0.6) 0%, rgba(14,124,123,0.3) 100%);
    border-radius: 4px;
  }

  .hero-img-content {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .bmi-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
    position: relative;
  }

  .bmi-ring svg {
    transform: rotate(-90deg);
  }

  .bmi-ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bmi-ring-label span {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: white;
    line-height: 1;
  }

  .bmi-ring-label small {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── MAIN LAYOUT ── */
  .main-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 64px 32px;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 48px;
    align-items: start;
  }

  /* ── CALCULATOR CARD ── */
  .calc-card {
    background: white;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .calc-header {
    background: var(--navy);
    padding: 28px 36px;
    color: white;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid var(--gold);
  }

  .calc-header-icon {
    width: 44px;
    height: 44px;
    background: var(--gold);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .calc-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
  }

  .calc-header p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .calc-body {
    padding: 36px;
  }

  /* Gender selector */
  .gender-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .gender-btn {
    padding: 14px;
    border: 2px solid var(--cream-dark);
    border-radius: 4px;
    background: var(--cream);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .gender-btn:hover {
    border-color: var(--teal-light);
    color: var(--teal);
    background: rgba(14,124,123,0.05);
  }

  .gender-btn.active {
    border-color: var(--teal);
    background: rgba(14,124,123,0.08);
    color: var(--teal);
  }

  .gender-btn .icon { font-size: 18px; }

  /* Form fields */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .form-group { position: relative; }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper input {
    width: 100%;
    padding: 13px 48px 13px 16px;
    border: 2px solid var(--cream-dark);
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--navy);
    background: var(--cream);
    transition: border-color 0.2s, background 0.2s;
    outline: none;
    font-weight: 500;
  }

  .input-wrapper input:focus {
    border-color: var(--teal);
    background: white;
    box-shadow: 0 0 0 3px rgba(14,124,123,0.1);
  }

  .input-unit {
    position: absolute;
    right: 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    pointer-events: none;
  }

  /* Range slider */
  .slider-group { margin-bottom: 28px; }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .slider-header label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  .slider-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--teal);
    font-weight: 500;
  }

  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--cream-dark);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--teal);
    cursor: pointer;
    border: 2px solid white;
    box-shadow: 0 2px 6px rgba(14,124,123,0.4);
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  /* Calculate button */
  .btn-calc {
    width: 100%;
    padding: 17px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-calc::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 3px;
    background: var(--gold);
  }

  .btn-calc:hover {
    background: var(--navy-light);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(10,22,40,0.3);
  }

  .btn-calc:active {
    transform: translateY(0);
  }

  /* ── RESULT CARD ── */
  .result-section {
    margin-top: 28px;
    display: none;
    animation: slideUp 0.4s ease;
  }

  .result-section.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
    margin: 28px 0;
  }

  .result-top {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
  }

  .result-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 3px solid;
    position: relative;
  }

  .result-circle .imc-val {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }

  .result-circle .imc-unit {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: 2px;
  }

  .result-info h4 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .result-info p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* IMC Scale */
  .imc-scale {
    margin: 20px 0;
  }

  .imc-scale-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .scale-bar {
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #3b82f6 0%, #22c55e 30%, #eab308 55%, #f97316 75%, #ef4444 100%);
    position: relative;
    margin-bottom: 6px;
  }

  .scale-needle {
    position: absolute;
    top: -4px;
    width: 18px;
    height: 18px;
    background: var(--navy);
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transform: translateX(-50%);
    transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-light);
  }

  /* Result alert box */
  .result-alert {
    padding: 14px 18px;
    border-radius: 4px;
    border-left: 4px solid;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.5;
  }

  .result-alert .alert-icon { font-size: 16px; flex-shrink: 0; }

  /* Recommendations */
  .reco-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .reco-item {
    padding: 12px 14px;
    background: var(--cream);
    border-radius: 4px;
    border: 1px solid var(--border);
    font-size: 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.4;
    color: var(--text-primary);
  }

  .reco-item .reco-icon { font-size: 14px; flex-shrink: 0; }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  /* Info card */
  .info-card {
    background: white;
    border-radius: 6px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .info-card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .info-card-header .dot {
    width: 10px;
    height: 10px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .info-card-header h4 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
  }

  .info-card-body { padding: 20px 24px; }

  /* Classification table */
  .classif-table { width: 100%; border-collapse: collapse; }

  .classif-table tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .classif-table tr:last-child { border-bottom: none; }
  .classif-table tr:hover { background: var(--cream); }

  .classif-table td {
    padding: 10px 8px;
    font-size: 13px;
    vertical-align: middle;
  }

  .classif-table td:last-child {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .cat-name {
    display: flex;
    align-items: center;
    font-weight: 500;
    color: var(--text-primary);
  }

  /* Image card */
  .img-card {
    background: white;
    border-radius: 6px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .img-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    filter: grayscale(15%);
  }

  .img-card-caption {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
  }

  .img-card-caption h5 {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .img-card-caption p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Disclaimer card */
  .disclaimer {
    background: var(--navy-mid);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 16px 20px;
    font-size: 12px;
    line-height: 1.6;
    border-left: 3px solid var(--gold);
    display: flex;
    gap: 12px;
  }

  .disclaimer strong {
    color: var(--gold-light);
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── WHO SECTION ── */
  .who-section {
    background: white;
    border-top: 1px solid var(--border);
    padding: 56px 32px;
  }

  .who-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--teal);
    margin-bottom: 10px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .section-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 560px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .who-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .who-card {
    padding: 24px;
    border-radius: 4px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .who-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-sm);
  }

  .who-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .who-card.c1::before { background: #3b82f6; }
  .who-card.c2::before { background: #22c55e; }
  .who-card.c3::before { background: #eab308; }
  .who-card.c4::before { background: #f97316; }
  .who-card.c5::before { background: #ef4444; }

  .who-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 3px;
    margin-bottom: 16px;
    filter: grayscale(20%);
  }

  .who-card-imc {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
